<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalog — Evstratov</title>
  <link href="https://fonts.googleapis.com/css2?family=Jomolhari&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #F9EEDF;
      color: #1A1A1A;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .fixed-title {
      position: fixed;
      top: 5px;
      right: 5px;
      font-family: 'Jomolhari', serif;
      font-size: 12px;
      letter-spacing: 18px;
      color: #1A1A1A;
      z-index: 1000;
      text-transform: uppercase;
      font-weight: normal;
    }

    .back-home {
      position: fixed;
      top: 8px;
      left: 15px;
      font-family: 'Jomolhari', serif;
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #1A1A1A;
      text-decoration: none;
      z-index: 1000;
      transition: opacity 0.3s;
    }

    .back-home:hover {
      opacity: 0.4;
    }

    .catalog-grid {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 30px 80px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
    }

    .catalog-item {
      display: block;
      transition: opacity 0.4s;
    }

    .catalog-item:hover {
      opacity: 0.7;
    }

    .catalog-item img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 480px) {
      .catalog-grid {
        grid-template-columns: 1fr;
        max-width: 100%;
        gap: 5px;
        padding: 50px 5px 60px;
      }
    }
  </style>
</head>
<body>

  <div class="fixed-title">EVSTRATOV</div>
  <a href="index.html" class="back-home">← back</a>

  <div class="catalog-grid">
    <a href="#" class="catalog-item"><img src="IMG_2.jpeg" alt="Look I"></a>
    <a href="#" class="catalog-item"><img src="IMG_4.jpeg" alt="Look II"></a>
    <a href="#" class="catalog-item"><img src="IMG_6.jpeg" alt="Look III"></a>
    <a href="#" class="catalog-item"><img src="IMG_8.jpeg" alt="Look IV"></a>
  </div>

</body>
</html>
