<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalog — Evstratov</title>
  <link href="https://fonts.googleapis.com/css2?family=Jomolhari&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #F9EEDF;
      color: #1A1A1A;
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .fixed-title {
      position: fixed;
      top: 5px;
      right: 5px;
      font-family: 'Jomolhari', serif;
      font-size: 12px;
      letter-spacing: 18px;
      color: #1A1A1A;
      z-index: 1000;
      text-transform: uppercase;
      font-weight: normal;
    }

    .back-home {
      position: fixed;
      top: 8px;
      left: 15px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #1A1A1A;
      text-decoration: none;
      z-index: 1000;
      transition: opacity 0.3s;
    }

    .back-home:hover {
      opacity: 0.4;
    }

    .page-title {
      text-align: center;
      padding-top: 12vh;
      margin-bottom: 8vh;
      font-family: 'Jomolhari', serif;
      font-size: 10px;
      letter-spacing: 6px;
      text-transform: uppercase;
      font-weight: normal;
      opacity: 0.5;
    }

    .catalog-grid {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 30px 80px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 40px 30px;
    }

    .catalog-item {
      text-decoration: none;
      color: #1A1A1A;
      transition: opacity 0.4s;
    }

    .catalog-item:hover {
      opacity: 0.6;
    }

    .catalog-item img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      display: block;
    }

    .catalog-item-name {
      margin-top: 8px;
      font-size: 9px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
    }

    .catalog-item-price {
      margin-top: 3px;
      font-size: 8px;
      font-weight: 300;
      letter-spacing: 1px;
      text-align: center;
      opacity: 0.5;
    }

    @media (max-width: 480px) {
      .catalog-grid {
        grid-template-columns: 1fr;
        max-width: 300px;
        gap: 35px;
        padding: 0 20px 60px;
      }
    }
  </style>
</head>
<body>

  <div class="fixed-title">EVSTRATOV</div>
  <a href="index.html" class="back-home">← back</a>

  <div class="page-title">Catalog</div>

  <div class="catalog-grid">

    <a href="#" class="catalog-item">
      <img src="IMG_2.jpeg" alt="Look I">
      <div class="catalog-item-name">Look I</div>
      <div class="catalog-item-price">upon request</div>
    </a>

    <a href="#" class="catalog-item">
      <img src="IMG_4.jpeg" alt="Look II">
      <div class="catalog-item-name">Look II</div>
      <div class="catalog-item-price">upon request</div>
    </a>

    <a href="#" class="catalog-item">
      <img src="IMG_6.jpeg" alt="Look III">
      <div class="catalog-item-name">Look III</div>
      <div class="catalog-item-price">upon request</div>
    </a>

    <a href="#" class="catalog-item">
      <img src="IMG_8.jpeg" alt="Look IV">
      <div class="catalog-item-name">Look IV</div>
      <div class="catalog-item-price">upon request</div>
    </a>

  </div>

</body>
</html>
