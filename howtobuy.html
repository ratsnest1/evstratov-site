<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How to Buy — Evstratov</title>
  <link href="https://fonts.googleapis.com/css2?family=Jomolhari&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      overflow: hidden;
    }

    body {
      background-color: #000;
      color: white;
      font-family: 'Cormorant Garamond', serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .fixed-title {
      position: fixed;
      top: 5px;
      right: 5px;
      font-family: 'Jomolhari', serif;
      font-size: 12px;
      letter-spacing: 18px;
      color: white;
      z-index: 1000;
      text-transform: uppercase;
      font-weight: normal;
    }

    .back-home {
      position: fixed;
      top: 8px;
      left: 15px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: white;
      text-decoration: none;
      z-index: 1000;
      transition: opacity 0.3s;
    }

    .back-home:hover {
      opacity: 0.4;
    }

    .htb-content {
      max-width: 380px;
      text-align: center;
      padding: 0 30px;
      opacity: 0;
      animation: appear 2s ease 0.3s forwards;
    }

    .htb-title {
      font-family: 'Jomolhari', serif;
      font-size: 10px;
      letter-spacing: 6px;
      text-transform: uppercase;
      font-weight: normal;
      opacity: 0.5;
      margin-bottom: 30px;
    }

    .htb-steps {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .htb-step {
      text-align: center;
    }

    .htb-step-num {
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.3;
      margin-bottom: 6px;
    }

    .htb-step-text {
      font-size: 10px;
      font-weight: 300;
      line-height: 1.8;
      letter-spacing: 0.5px;
      opacity: 0.7;
    }

    .htb-note {
      margin-top: 35px;
      font-size: 8px;
      font-weight: 300;
      font-style: italic;
      opacity: 0.4;
      letter-spacing: 0.5px;
    }

    @keyframes appear {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .htb-content {
        max-width: 300px;
      }

      .htb-step-text {
        font-size: 9px;
      }
    }
  </style>
</head>
<body>

  <div class="fixed-title">EVSTRATOV</div>
  <a href="index.html" class="back-home">← back</a>

  <div class="htb-content">
    <div class="htb-title">How to Buy</div>
    <div class="htb-steps">

      <div class="htb-step">
        <div class="htb-step-num">I</div>
        <div class="htb-step-text">Write to us on Telegram or by mail<br>specify the item you are interested in</div>
      </div>

      <div class="htb-step">
        <div class="htb-step-num">II</div>
        <div class="htb-step-text">We will discuss the details:<br>size, delivery, and timing</div>
      </div>

      <div class="htb-step">
        <div class="htb-step-num">III</div>
        <div class="htb-step-text">The item will be created<br>specifically for you</div>
      </div>

    </div>
    <div class="htb-note">Each item is made to order and takes 2 to 4 weeks to complete.</div>
  </div>

</body>
</html>
