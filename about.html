<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — Evstratov</title>
  <link href="https://fonts.googleapis.com/css2?family=Jomolhari&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      overflow: hidden;
    }

    body {
      background-color: #000;
      color: white;
      font-family: 'Cormorant Garamond', serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .fixed-title {
      position: fixed;
      top: 5px;
      right: 5px;
      font-family: 'Jomolhari', serif;
      font-size: 12px;
      letter-spacing: 18px;
      color: white;
      z-index: 1000;
      text-transform: uppercase;
      font-weight: normal;
    }

    .back-home {
      position: fixed;
      top: 8px;
      left: 15px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: white;
      text-decoration: none;
      z-index: 1000;
      transition: opacity 0.3s;
    }

    .back-home:hover {
      opacity: 0.4;
    }

    .about-content {
      max-width: 400px;
      text-align: center;
      padding: 0 30px;
      opacity: 0;
      animation: appear 2s ease 0.3s forwards;
    }

    .about-title {
      font-family: 'Jomolhari', serif;
      font-size: 10px;
      letter-spacing: 6px;
      text-transform: uppercase;
      font-weight: normal;
      opacity: 0.5;
      margin-bottom: 30px;
    }

    .about-text {
      font-size: 10px;
      font-weight: 300;
      line-height: 2;
      letter-spacing: 0.5px;
      opacity: 0.7;
    }

    .about-text p {
      margin-bottom: 20px;
    }

    .about-text p:last-child {
      margin-bottom: 0;
    }

    @keyframes appear {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .about-content {
        max-width: 300px;
      }

      .about-text {
        font-size: 9px;
      }
    }
  </style>
</head>
<body>

  <div class="fixed-title">EVSTRATOV</div>
  <a href="index.html" class="back-home">← back</a>

  <div class="about-content">
    <div class="about-title">About</div>
    <div class="about-text">
      <p>Evstratov — независимый бренд одежды, основанный в 2025 году.</p>
      <p>Каждая вещь создаётся вручную в единственном экземпляре. Мы не следуем трендам. Мы следуем тишине.</p>
      <p>Одежда как молитва. Силуэт как храм. Ткань как кожа.</p>
    </div>
  </div>

</body>
</html>
